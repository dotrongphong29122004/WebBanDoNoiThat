<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Khách Hàng | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
  <div id="header-placeholder"></div>

  <div class="min-h-screen py-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Quản Lý Khách Hàng</h1>
        <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 transition-colors">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
          Về trang chủ
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-amber-600">
          <p class="text-sm text-gray-500 font-medium mb-1">Tổng tài khoản</p>
          <p id="totalUsers" class="text-2xl font-bold text-gray-900">0</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-blue-600">
          <p class="text-sm text-gray-500 font-medium mb-1">Khách hàng</p>
          <p id="totalCustomers" class="text-2xl font-bold text-gray-900">0</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-red-600">
          <p class="text-sm text-gray-500 font-medium mb-1">Quản trị viên</p>
          <p id="totalAdmins" class="text-2xl font-bold text-gray-900">0</p>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-100">
                <th class="py-4 px-6 font-semibold text-gray-600 text-sm">Người dùng</th>
                <th class="py-4 px-6 font-semibold text-gray-600 text-sm">Email</th>
                <th class="py-4 px-6 font-semibold text-gray-600 text-sm">Vai trò</th>
                <th class="py-4 px-6 font-semibold text-gray-600 text-sm text-right">Thao tác</th>
              </tr>
            </thead>
            <tbody id="usersTableBody" class="divide-y divide-gray-100">
              </tbody>
          </table>
        </div>
        <div id="emptyUsers" class="hidden p-12 text-center text-gray-500">
          Chưa có người dùng nào đăng ký hệ thống.
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Kiểm tra phải là Admin mới được vào
      if (!isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }
      const currentUser = JSON.parse(localStorage.getItem('currentUser'));
      if (!currentUser.isAdmin) {
        alert('Bạn không có quyền truy cập trang quản trị!');
        window.location.href = 'index.html';
        return;
      }

      renderUsers();
    });

    function renderUsers() {
      const usersList = JSON.parse(localStorage.getItem('usersList')) || [];
      const tbody = document.getElementById('usersTableBody');
      const emptyDiv = document.getElementById('emptyUsers');

      // Cập nhật thẻ thống kê
      document.getElementById('totalUsers').textContent = usersList.length;
      document.getElementById('totalCustomers').textContent = usersList.filter(u => !u.isAdmin).length;
      document.getElementById('totalAdmins').textContent = usersList.filter(u => u.isAdmin).length;

      if (usersList.length === 0) {
        tbody.innerHTML = '';
        emptyDiv.classList.remove('hidden');
        return;
      }

      emptyDiv.classList.add('hidden');
      let html = '';

      usersList.forEach((user) => {
        // Phân biệt giao diện badge theo vai trò
        const roleBadge = user.isAdmin 
          ? '<span class="px-3 py-1 bg-red-50 text-red-600 rounded-full text-xs font-semibold">Admin</span>'
          : '<span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-semibold">Khách hàng</span>';

        // Chặn không cho xóa tài khoản admin gốc
        const deleteBtn = user.email === 'admin@gmail.com' 
          ? '<span class="text-gray-400 text-sm italic">Không thể xóa</span>'
          : `<button onclick="deleteUser('${user.email}')" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Xóa người dùng"><i data-lucide="trash-2" class="w-5 h-5"></i></button>`;

        html += `
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="py-4 px-6">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center font-bold">
                  ${user.name.charAt(0).toUpperCase()}
                </div>
                <span class="font-semibold text-gray-900">${user.name}</span>
              </div>
            </td>
            <td class="py-4 px-6 text-gray-600">${user.email}</td>
            <td class="py-4 px-6">${roleBadge}</td>
            <td class="py-4 px-6 text-right">${deleteBtn}</td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    window.deleteUser = function(email) {
      if (confirm(`Bạn có chắc chắn muốn xóa tài khoản "${email}"?\nToàn bộ giỏ hàng của tài khoản này cũng sẽ bị xóa sạch.`)) {
        let usersList = JSON.parse(localStorage.getItem('usersList')) || [];
        
        // Lọc bỏ người dùng bị xóa
        usersList = usersList.filter(u => u.email !== email);
        localStorage.setItem('usersList', JSON.stringify(usersList));
        
        // Dọn dẹp luôn giỏ hàng của người đó trong Local Storage
        localStorage.removeItem('cartData_' + email);
        
        alert('Đã xóa tài khoản thành công!');
        renderUsers();
      }
    };
  </script>
</body>
</html>
